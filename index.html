<!DOCTYPE html>
<html lang="zh-TW" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Pavora - AI 時尚工作室</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@300;400;500;600&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --font-display: 'Cinzel', serif;
        --font-serif: 'Playfair Display', serif;
        --font-body: 'Inter', 'Noto Sans TC', sans-serif;
        --transition-speed: 0.5s;
        --ease-out-expo: cubic-bezier(0.19, 1, 0.22, 1);
      }

      /* 夜晚模式 (Deep Obsidian & Layered Grays) */
      .dark {
        --color-gold: #D4AF37;
        --color-gold-light: #F3E5AB;
        --color-gold-dark: #8A6E2F;
        
        /* 背景層次 */
        --color-bg-deep: #080808;      /* 基礎底層 */
        --color-bg-surface: #121212;   /* 卡片/面板層 */
        --color-bg-elevated: #1E1E1E;  /* 彈窗/浮動層 */
        
        --color-bg-panel: rgba(18, 18, 18, 0.75);
        --color-bg-input: rgba(30, 30, 30, 0.6);
        
        /* 文字系統 */
        --color-text-title: #FFFFFF;
        --color-text-main: #E0E0E0;
        --color-text-dim: #888888;
        
        /* 功能色 */
        --color-success: #2D5A27;      /* 翡翠綠 */
        --color-info: #1A3A5A;         /* 寶石藍 */
        --color-error: #7F1D1D;
        
        --color-border: rgba(255, 255, 255, 0.08);
        --color-shadow: rgba(0, 0, 0, 0.8);
      }

      /* 白天模式 (High-Contrast Ivory & Refined Paper) */
      .light {
        --color-gold: #7A5C2D;
        --color-gold-light: #A68B5B;
        --color-gold-dark: #4D3A1C;
        
        /* 背景層次 */
        --color-bg-deep: #FDFCF8;      /* 象牙白紙張感 */
        --color-bg-surface: #F5F2E9;   /* 次級面板 */
        --color-bg-elevated: #FFFFFF;  /* 純白提升層 */
        
        --color-bg-panel: rgba(255, 255, 255, 0.92);
        --color-bg-input: #F2F0E9;
        
        /* 文字系統 */
        --color-text-title: #000000;
        --color-text-main: #1A1A1A;
        --color-text-dim: #666666;
        
        /* 功能色 */
        --color-success: #3E7B37;
        --color-info: #2A5A8A;
        --color-error: #991B1B;
        
        --color-border: rgba(0, 0, 0, 0.12);
        --color-shadow: rgba(122, 92, 45, 0.1);
      }
      
      body {
        font-family: var(--font-body);
        background-color: var(--color-bg-deep);
        color: var(--color-text-main);
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        transition: background-color var(--transition-speed) var(--ease-out-expo), color var(--transition-speed);
        /* 背景徑向漸層 - 模擬攝影棚燈光 */
        background-image: radial-gradient(circle at 50% -20%, rgba(212, 175, 55, 0.05) 0%, transparent 70%);
      }

      .dark body {
        background-image: radial-gradient(circle at 50% -20%, rgba(212, 175, 55, 0.08) 0%, transparent 60%);
      }

      h1, h2, h3, h4, h5, h6 {
        color: var(--color-text-title) !important;
        transition: color var(--transition-speed);
        letter-spacing: -0.02em;
      }

      /* 時尚雜誌排版張力 */
      .font-display { 
        font-family: var(--font-display); 
        font-weight: 300; /* 預設較細，展現優雅感 */
      }
      
      .display-bold { font-weight: 700; }
      .display-thin { font-weight: 200; letter-spacing: 0.15em; }

      p, span:not(.text-gold-gradient), div:not(.no-theme-force) {
        color: inherit;
      }

      label {
        color: var(--color-text-dim) !important;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        font-weight: 600;
        transition: color var(--transition-speed);
      }

      input, select, textarea {
        background-color: var(--color-bg-input) !important;
        color: var(--color-text-main) !important;
        border: 1px solid var(--color-border) !important;
        border-radius: 4px;
        padding: 0.5rem 0.75rem;
        transition: all 0.3s ease;
      }

      input:focus, select:focus, textarea:focus {
        border-color: var(--color-gold) !important;
        outline: none;
        box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.1);
      }

      /* Noise Texture Overlay - 優化透明度 */
      body::before {
        content: "";
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 1000;
        opacity: 0.4;
      }
      
      .light body::before { opacity: 0.02; }
      
      .glass-panel {
        background: var(--color-bg-panel);
        backdrop-filter: blur(30px);
        -webkit-backdrop-filter: blur(30px);
        border: 1px solid var(--color-border);
        box-shadow: 0 15px 50px var(--color-shadow);
        transition: all var(--transition-speed) var(--ease-out-expo);
      }

      .text-gold-gradient {
        background: linear-gradient(135deg, var(--color-gold-light) 0%, var(--color-gold) 50%, var(--color-gold-dark) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      /* 局部重繪閃爍金邊按鈕 */
      @keyframes gold-flash {
        0% { border-color: rgba(212, 175, 55, 0.3); box-shadow: 0 0 5px rgba(212, 175, 55, 0.2); }
        50% { border-color: rgba(212, 175, 55, 1); box-shadow: 0 0 25px rgba(212, 175, 55, 0.6); }
        100% { border-color: rgba(212, 175, 55, 0.3); box-shadow: 0 0 5px rgba(212, 175, 55, 0.2); }
      }
      .btn-precision-fix {
        animation: gold-flash 3s infinite ease-in-out;
        border-width: 1.5px !important;
      }

      /* 捲軸美化 */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { 
        background: var(--color-border); 
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover { background: var(--color-gold-dark); }

      /* --- 第三階段：組件交互與細節體驗 --- */

      /* 按鈕分級系統 */
      .btn-primary {
        background: linear-gradient(135deg, var(--color-gold-light) 0%, var(--color-gold) 50%, var(--color-gold-dark) 100%);
        color: #000 !important;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        border: none;
        box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
        transition: all 0.4s var(--ease-out-expo);
        position: relative;
        overflow: hidden;
      }
      
      .btn-primary::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(
          120deg,
          transparent,
          rgba(255, 255, 255, 0.4),
          transparent
        );
        transition: all 0.6s;
      }
      
      .btn-primary:hover::before {
        left: 100%;
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 25px rgba(212, 175, 55, 0.5);
        filter: brightness(1.1);
      }
      .btn-primary:active { transform: scale(0.96); }

      .btn-secondary {
        background: var(--color-bg-input);
        backdrop-filter: blur(10px);
        border: 1px solid var(--color-border);
        color: var(--color-text-main);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        transition: all 0.4s var(--ease-out-expo);
      }
      .btn-secondary:hover {
        border-color: var(--color-gold);
        background: rgba(212, 175, 55, 0.05);
        color: var(--color-gold);
      }
      .btn-secondary:active { transform: scale(0.96); }

      .btn-ghost {
        background: transparent;
        color: var(--color-text-dim);
        text-transform: uppercase;
        letter-spacing: 0.1em;
        transition: all 0.3s ease;
      }
      .btn-ghost:hover {
        color: var(--color-text-main);
        background: rgba(255, 255, 255, 0.05);
      }

      /* 自定義滑桿 (Custom Range Slider) */
      input[type="range"] {
        -webkit-appearance: none;
        width: 100%;
        height: 2px;
        background: var(--color-border);
        border: none !important;
        outline: none;
        margin: 15px 0;
      }
      
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 12px;
        height: 12px;
        background: var(--color-gold);
        border-radius: 50%;
        cursor: pointer;
        box-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        transition: all 0.3s ease;
      }

      input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.3);
        box-shadow: 0 0 15px rgba(212, 175, 55, 0.8);
      }

      /* 流光加載動畫 (Metal Flow) */
      @keyframes metal-flow {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      .loading-bar {
        height: 2px;
        width: 100%;
        background: var(--color-border);
        position: relative;
        overflow: hidden;
      }
      .loading-bar::after {
        content: "";
        position: absolute;
        top: 0; left: 0; width: 50%; height: 100%;
        background: linear-gradient(90deg, transparent, var(--color-gold), transparent);
        background-size: 200% 100%;
        animation: metal-flow 1.5s infinite linear;
      }

      /* 可折疊面板動畫 */
      .collapsible-content {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.5s var(--ease-out-expo), opacity 0.3s ease;
        opacity: 0;
      }
      .collapsible-content.open {
        max-height: 3000px;
        opacity: 1;
      }

      @keyframes scan {
        0% { top: 0; opacity: 0; }
        50% { opacity: 0.5; }
        100% { top: 100%; opacity: 0; }
      }
      @keyframes loading {
        0% { transform: translateY(100%); }
        50% { transform: translateY(0); }
        100% { transform: translateY(-100%); }
      }

      .light ::-webkit-scrollbar-track { background: #F2F0E9; }
      .light ::-webkit-scrollbar-thumb { background: #D1CFB9; }
    </style>
