<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="title desc">
  <title id="title">PAVORA Primary Logo</title>
  <desc id="desc">A professional ecommerce fashion logo for PAVORA, combining a minimal hanger and folded fabric motif into a refined P-shaped symbol with a luxury wordmark.</desc>
  <defs>
    <linearGradient id="markWine" x1="460" y1="354" x2="678" y2="678" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A23A52"/>
      <stop offset="1" stop-color="#671C31"/>
    </linearGradient>
    <linearGradient id="markGold" x1="430" y1="330" x2="670" y2="330" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E7C981"/>
      <stop offset="1" stop-color="#AE7C32"/>
    </linearGradient>
    <filter id="logoShadow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#161311" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect width="1600" height="1200" fill="#FFF9F0"/>

  <g transform="translate(0 -14)" filter="url(#logoShadow)">
    <g transform="translate(402 315)">
      <path d="M136 36c0-28 24-49 55-49 28 0 51 17 56 42" fill="none" stroke="url(#markGold)" stroke-width="20" stroke-linecap="round"/>
      <path d="M191 0v48" fill="none" stroke="#161311" stroke-width="18" stroke-linecap="round"/>
      <path d="M92 383V83h132c91 0 148 48 148 123 0 78-57 126-148 126h-55v51H92Z" fill="#161311"/>
      <path d="M169 155v104h48c49 0 76-18 76-53 0-34-27-51-76-51h-48Z" fill="#FFF9F0"/>
      <path d="M169 384c35-79 82-140 141-184 19-14 38-26 59-36-14 69-43 125-88 169-32 31-70 51-112 61Z" fill="url(#markWine)"/>
      <path d="M182 362c39-45 82-78 129-99" fill="none" stroke="#D2A34F" stroke-width="15" stroke-linecap="round"/>
    </g>

    <g transform="translate(760 481)">
      <text x="0" y="0"
        font-family="Bodoni 72, Bodoni MT, Didot, Georgia, serif"
        font-size="128"
        font-weight="700"
        letter-spacing="18"
        fill="#161311">PAVORA</text>
      <path d="M8 50H546" stroke="#8D263F" stroke-width="5" stroke-linecap="round"/>
      <path d="M146 84H408" stroke="#C79B4B" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
    </g>
  </g>
</svg>
